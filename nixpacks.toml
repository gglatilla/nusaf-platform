# Nixpacks configuration for Railway deployment
# Uses corepack to automatically enable pnpm based on packageManager in package.json

[phases.setup]
nixPkgs = ["nodejs_20"]
cmds = ["corepack enable"]

[phases.install]
cmds = ["pnpm install"]

[phases.build]
cmds = ["pnpm build --filter=@nusaf/webapp"]

[start]
cmd = "pnpm --filter=@nusaf/webapp start"
